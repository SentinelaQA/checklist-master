<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Checklist de Qualidade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1f2e 0%, #2d3548 50%, #1e2636 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .login-container {
      background: #242b3d;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      animation: slideIn 0.5s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-container { text-align: center; margin-bottom: 30px; }
    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #00A4E0 0%, #00D664 100%);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(0,164,224,0.3);
    }
    .logo-icon { font-size: 40px; color: white; }
    .logo-title {
      font-size: 24px; font-weight: 800;
      background: linear-gradient(135deg, #00A4E0 0%, #00D664 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }
    .logo-subtitle { font-size: 14px; color: #8892a4; font-weight: 500; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #a0aec0; font-size: 14px; }
    .form-group input {
      width: 100%; padding: 14px 18px;
      border: 2px solid #3a4256; border-radius: 10px;
      font-size: 15px; transition: all 0.3s; font-family: inherit;
      background: #1a1f2e; color: #e2e8f0;
    }
    .form-group input:focus { outline: none; border-color: #00A4E0; box-shadow: 0 0 0 3px rgba(0,164,224,0.2); }
    .form-group input::placeholder { color: #5a6577; }
    .password-container { position: relative; }
    .toggle-password {
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 18px; color: #8892a4;
    }
    .btn-login {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #00A4E0 0%, #00C85A 100%);
      color: white; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 10px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,164,224,0.4); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert {
      padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;
      font-size: 14px; font-weight: 500; display: none;
    }
    .alert-error { background: rgba(220,53,69,0.15); color: #ff6b7a; border: 2px solid rgba(220,53,69,0.4); }
    .alert-success { background: rgba(40,167,69,0.15); color: #5be880; border: 2px solid rgba(40,167,69,0.4); }
    .loading { display: none; text-align: center; margin: 20px 0; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #3a4256; border-top: 4px solid #00A4E0;
      border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .remember-me { display: flex; align-items: center; margin-bottom: 20px; }
    .remember-me input[type="checkbox"] { width: 18px; height: 18px; margin-right: 8px; cursor: pointer; accent-color: #00A4E0; }
    .remember-me label { font-size: 14px; color: #8892a4; cursor: pointer; user-select: none; }
    .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #3a4256; text-align: center; }
    .footer-text { font-size: 11px; color: #6a7489; font-weight: 500; }
    .footer-author { font-weight: 700; background: linear-gradient(135deg, #00A4E0 0%, #00D664 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <div class="logo"><div class="logo-icon">✓</div></div>
      <div class="logo-title">Checklist de Qualidade</div>
      <div class="logo-subtitle">Sistema de Qualidade</div>
    </div>

    <div id="alertBox" class="alert"></div>
    <div class="loading" id="loadingBox">
      <div class="spinner"></div>
      <p style="margin-top:10px;color:#6c757d;font-size:14px;">Verificando...</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu.email@empresa.com.br" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-container">
          <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
        </div>
      </div>
      <div class="remember-me">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Lembrar-me neste dispositivo</label>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
    </form>

    <div class="footer">
      <p class="footer-text">
        Desenvolvido por <span class="footer-author">Yasmin de Melo Campos</span><br>
        Analista de Qualidade
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

   // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAGJRM0Zq_U1uaQV25eJQsLZueITMjDbIA",
  authDomain: "checklist-qualidade-7bdf3.firebaseapp.com",
  projectId: "checklist-qualidade-7bdf3",
  storageBucket: "checklist-qualidade-7bdf3.firebasestorage.app",
  messagingSenderId: "154335831153",
  appId: "1:154335831153:web:52c8260fe05e022ed827d0",
  measurementId: "G-4K7D8HTQXF"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnLogin = document.getElementById('btnLogin');
    const alertBox = document.getElementById('alertBox');
    const loadingBox = document.getElementById('loadingBox');
    const rememberMe = document.getElementById('rememberMe');

    // Verificar se já está logado
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.location.href = '/checklist.html';
      }
    });

    // Carregar e-mail salvo
    const savedEmail = localStorage.getItem('rememberedEmail');
    if (savedEmail) {
      emailInput.value = savedEmail;
      rememberMe.checked = true;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showAlert('Por favor, preencha todos os campos.', 'error');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando...';
      loadingBox.style.display = 'block';
      alertBox.style.display = 'none';

      try {
        // Define persistência
        const persistence = rememberMe.checked ? browserLocalPersistence : browserSessionPersistence;
        await setPersistence(auth, persistence);

        // Login no Firebase Auth
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const uid = userCred.user.uid;

        // Buscar dados do usuário no Firestore
        const userDoc = await getDoc(doc(db, 'usuarios', uid));
        let role = 'usuario';
        let name = email;

        // Forçar admin para ymcampos@stefanini.com
        if (email.toLowerCase() === 'ymcampos@stefanini.com') {
          role = 'admin';
          name = 'Yasmin de Melo Campos';
        } else if (userDoc.exists()) {
          const data = userDoc.data();
          role = data.cargo || 'usuario';
          name = data.nome || email;
        } else {
          role = 'usuario';
          name = email;
        }

        // Salvar dados na sessão
        sessionStorage.setItem('userRole', role);
        sessionStorage.setItem('userName', name);
        sessionStorage.setItem('userUID', uid);

        if (rememberMe.checked) {
          localStorage.setItem('rememberedEmail', email);
        } else {
          localStorage.removeItem('rememberedEmail');
        }

        // Registrar log de acesso
        const logs = JSON.parse(localStorage.getItem('accessLogs') || '[]');
        logs.unshift({ email, name, role, date: new Date().toISOString() });
        if (logs.length > 100) logs.length = 100;
        localStorage.setItem('accessLogs', JSON.stringify(logs));

        showAlert('Login realizado com sucesso! Redirecionando...', 'success');
        setTimeout(() => { window.location.href = '/checklist.html'; }, 1000);

      } catch (error) {
        console.error(error);
        let msg = 'E-mail ou senha incorretos.';
        if (error.code === 'auth/too-many-requests') msg = 'Muitas tentativas. Aguarde alguns minutos.';
        if (error.code === 'auth/network-request-failed') msg = 'Erro de conexão. Verifique sua internet.';
        if (error.code === 'auth/invalid-credential') msg = 'E-mail ou senha inválidos. Verifique seus dados.';
        if (error.code === 'auth/user-not-found') msg = 'Usuário não encontrado. Verifique o e-mail.';
        if (error.code === 'auth/wrong-password') msg = 'Senha incorreta. Tente novamente.';
        if (error.code === 'auth/password-does-not-meet-requirements') msg = 'A senha precisa ter pelo menos 1 caractere especial (ex: Qualidade2026!). Redefina no painel Firebase.';
        showAlert(msg, 'error');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
        loadingBox.style.display = 'none';
      }
    });

    function showAlert(message, type) {
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type}`;
      alertBox.style.display = 'block';
      if (type === 'success') setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
    }

    window.togglePassword = function() {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
    };
  </script>
</body>
</html>

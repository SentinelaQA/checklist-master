<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Checklist de Qualidade Cielo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1f2e 0%, #2d3548 50%, #1e2636 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: #242b3d;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      animation: slideIn 0.5s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #00A4E0 0%, #00D664 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 4px 20px rgba(0, 164, 224, 0.3);
    }

    .logo-icon {
      font-size: 40px;
      color: white;
    }

    .logo-title {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #00A4E0 0%, #00D664 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    .logo-subtitle {
      font-size: 14px;
      color: #8892a4;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #a0aec0;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #3a4256;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
      font-family: inherit;
      background: #1a1f2e;
      color: #e2e8f0;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00A4E0;
      box-shadow: 0 0 0 3px rgba(0, 164, 224, 0.2);
    }

    .form-group input::placeholder {
      color: #5a6577;
    }

    .password-container {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #8892a4;
      transition: color 0.3s;
    }

    .toggle-password:hover {
      color: #00A4E0;
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00A4E0 0%, #00D664 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 164, 224, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      animation: shake 0.5s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .alert-error {
      background: rgba(220, 53, 69, 0.15);
      color: #ff6b7a;
      border: 2px solid rgba(220, 53, 69, 0.4);
    }

    .alert-success {
      background: rgba(40, 167, 69, 0.15);
      color: #5be880;
      border: 2px solid rgba(40, 167, 69, 0.4);
    }

    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #00A4E0;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #3a4256;
      text-align: center;
    }

    .footer-text {
      font-size: 11px;
      color: #6a7489;
      font-weight: 500;
    }

    .footer-author {
      font-weight: 700;
      background: linear-gradient(135deg, #00A4E0 0%, #00D664 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .remember-me {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      cursor: pointer;
      accent-color: #00A4E0;
    }

    .remember-me label {
      font-size: 14px;
      color: #6c757d;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 25px;
      }

      .logo-title {
        font-size: 20px;
      }

      .logo-subtitle {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <div class="logo">
        <div class="logo-icon">✓</div>
      </div>
      <div class="logo-title">Checklist de Qualidade</div>
      <div class="logo-subtitle">Sistema Cielo</div>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="loading" id="loadingBox">
      <div class="spinner"></div>
      <p style="margin-top: 10px; color: #6c757d; font-size: 14px;">Verificando...</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          placeholder="seu.email@cielo.com.br"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-container">
          <input 
            type="password" 
            id="password" 
            placeholder="Digite sua senha"
            required
            autocomplete="current-password"
          >
          <button type="button" class="toggle-password" onclick="togglePassword()">
            👁️
          </button>
        </div>
      </div>

      <div class="remember-me">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Lembrar-me neste dispositivo</label>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        Entrar
      </button>
    </form>

    <div class="footer">
      <p class="footer-text">
        Desenvolvido por <span class="footer-author">Yasmin de Melo Campos</span><br>
        Analista de Qualidade
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    // Import Firebase
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    // Configuração do Firebase (VOCÊ PRECISA SUBSTITUIR COM SUAS CREDENCIAIS)
    const firebaseConfig = {
      apiKey: "SUA_API_KEY_AQUI",
      authDomain: "SEU_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://SEU_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "SEU_PROJECT_ID",
      storageBucket: "SEU_PROJECT_ID.appspot.com",
      messagingSenderId: "SEU_MESSAGING_SENDER_ID",
      appId: "SEU_APP_ID"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // Elementos
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnLogin = document.getElementById('btnLogin');
    const alertBox = document.getElementById('alertBox');
    const loadingBox = document.getElementById('loadingBox');
    const rememberMe = document.getElementById('rememberMe');

    // Verificar se usuário já está logado
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Verificar se usuário está autorizado
        const userRef = ref(database, 'usuarios/' + user.uid);
        const snapshot = await get(userRef);
        
        if (snapshot.exists() && snapshot.val().autorizado) {
          // Redirecionar para o sistema
          window.location.href = 'checklist_final.html';
        } else {
          // Usuário não autorizado
          auth.signOut();
          showAlert('Usuário não autorizado. Contate o administrador.', 'error');
        }
      }
    });

    // Carregar e-mail salvo
    window.addEventListener('DOMContentLoaded', () => {
      const savedEmail = localStorage.getItem('rememberedEmail');
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberMe.checked = true;
      }
    });

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showAlert('Por favor, preencha todos os campos.', 'error');
        return;
      }

      // Mostrar loading
      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando...';
      loadingBox.style.display = 'block';
      alertBox.style.display = 'none';

      try {
        // Tentar fazer login
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Verificar se usuário está autorizado no banco de dados
        const userRef = ref(database, 'usuarios/' + user.uid);
        const snapshot = await get(userRef);

        if (!snapshot.exists()) {
          // Usuário não encontrado no banco
          await auth.signOut();
          throw new Error('Usuário não cadastrado no sistema.');
        }

        const userData = snapshot.val();
        
        if (!userData.autorizado) {
          // Usuário não autorizado
          await auth.signOut();
          throw new Error('Acesso não autorizado. Contate o administrador.');
        }

        // Salvar e-mail se marcado
        if (rememberMe.checked) {
          localStorage.setItem('rememberedEmail', email);
        } else {
          localStorage.removeItem('rememberedEmail');
        }

        // Login bem-sucedido
        showAlert('Login realizado com sucesso! Redirecionando...', 'success');
        
        // Redirecionar após 1 segundo
        setTimeout(() => {
          window.location.href = 'checklist_final.html';
        }, 1000);

      } catch (error) {
        console.error('Erro no login:', error);
        
        let errorMessage = 'Erro ao fazer login. Tente novamente.';
        
        switch (error.code) {
          case 'auth/invalid-email':
            errorMessage = 'E-mail inválido.';
            break;
          case 'auth/user-disabled':
            errorMessage = 'Usuário desabilitado.';
            break;
          case 'auth/user-not-found':
            errorMessage = 'E-mail não cadastrado.';
            break;
          case 'auth/wrong-password':
            errorMessage = 'Senha incorreta.';
            break;
          case 'auth/invalid-credential':
            errorMessage = 'E-mail ou senha incorretos.';
            break;
          case 'auth/too-many-requests':
            errorMessage = 'Muitas tentativas. Tente novamente mais tarde.';
            break;
          default:
            errorMessage = error.message;
        }
        
        showAlert(errorMessage, 'error');
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
        loadingBox.style.display = 'none';
      }
    });

    function showAlert(message, type) {
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type}`;
      alertBox.style.display = 'block';
      
      if (type === 'success') {
        setTimeout(() => {
          alertBox.style.display = 'none';
        }, 3000);
      }
    }

    // Expor função globalmente para o botão
    window.togglePassword = function() {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
    }
  </script>
</body>
</html>
